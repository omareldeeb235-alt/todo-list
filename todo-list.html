<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background: #f5f0e8;
      min-height: 100vh;
      padding: 60px 20px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      color: #2c2c2c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #999;
      margin-bottom: 32px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: Georgia, serif;
      background: #fff;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus { border-color: #888; }

    .add-btn {
      padding: 10px 20px;
      background: #2c2c2c;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
    }

    .add-btn:hover { background: #444; }

    #list { list-style: none; }

    #list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #e0d8cc;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

    #list li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #2c2c2c;
    }

    #list li span {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      transition: all 0.2s;
    }

    #list li.done span {
      text-decoration: line-through;
      color: #bbb;
    }

    .del-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .del-btn:hover { color: #e57373; }

    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Tasks</h1>
    <p class="subtitle">Keep it simple. Get it done.</p>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addTask()">
      <button class="add-btn" onclick="addTask()">+</button>
    </div>

    <ul id="list"></ul>

    <p class="footer" id="footer"></p>
  </div>

  <script>
    function addTask() {
      let input = document.getElementById('taskInput');
      let text = input.value.trim();
      if (!text) return;

      let li = document.createElement('li');

      let cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.onchange = function() {
        li.classList.toggle('done', cb.checked);
        updateFooter();
      };

      let span = document.createElement('span');
      span.textContent = text;

      let del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.onclick = function() {
        li.remove();
        updateFooter();
      };

      li.appendChild(cb);
      li.appendChild(span);
      li.appendChild(del);
      document.getElementById('list').appendChild(li);

      input.value = '';
      input.focus();
      updateFooter();
    }

    function updateFooter() {
      let items = document.querySelectorAll('#list li');
      let done = document.querySelectorAll('#list li.done');
      if (items.length === 0) {
        document.getElementById('footer').textContent = '';
      } else {
        document.getElementById('footer').textContent = done.length + ' of ' + items.length + ' completed';
      }
    }
  </script>
</body>
</html>
