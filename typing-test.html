<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: #fafaf8;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    .stats {
      display: flex;
      gap: 40px;
      margin-bottom: 36px;
    }

    .stat { text-align: center; }

    .stat-val {
      font-size: 2.2rem;
      font-weight: bold;
      color: #222;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 1px;
      margin-top: 4px;
      text-transform: uppercase;
    }

    #textBox {
      max-width: 600px;
      width: 100%;
      font-size: 1.15rem;
      line-height: 2;
      letter-spacing: 0.5px;
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 24px 28px;
      margin-bottom: 24px;
      user-select: none;
      cursor: text;
    }

    .char { color: #ccc; }
    .char.correct { color: #4caf50; }
    .char.wrong { color: #e53935; background: #ffebee; border-radius: 2px; }
    .char.active { border-bottom: 2px solid #667eea; color: #222; }

    /* Hidden input — still focusable */
    #typingInput {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      top: 0; left: 0;
      pointer-events: none;
    }

    .click-hint {
      font-size: 0.85rem;
      color: #bbb;
      margin-bottom: 10px;
    }

    button {
      padding: 11px 32px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: #555;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
      margin-top: 16px;
    }

    button:hover { background: #222; color: #fff; border-color: #222; }

    .done-msg {
      margin-top: 20px;
      font-size: 1rem;
      color: #667eea;
      font-weight: bold;
      letter-spacing: 1px;
      min-height: 24px;
    }
  </style>
</head>
<body>

  <h1>Typing Speed</h1>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="wpm">0</div><div class="stat-label">WPM</div></div>
    <div class="stat"><div class="stat-val" id="acc">100</div><div class="stat-label">Accuracy %</div></div>
    <div class="stat"><div class="stat-val" id="timer">60</div><div class="stat-label">Seconds</div></div>
  </div>

  <!-- FIX 1: onclick now correctly calls focusInput() instead of window.focus() -->
  <div id="textBox" onclick="focusInput()"></div>
  <p class="click-hint">Click the text and start typing</p>
  <input id="typingInput" type="text" autocomplete="off" tabindex="-1" readonly>

  <div class="done-msg" id="doneMsg"></div>
  <button onclick="restart()">New Test</button>

  <script>
    const sentences = [
      "The quick brown fox jumps over the lazy dog near the riverbank every single morning.",
      "Learning to type quickly is a valuable skill that saves time and improves productivity at work.",
      "Practice makes perfect and consistent effort will always lead to better results over time.",
      "A good programmer writes code that both machines and humans can understand with equal ease.",
      "The sun sets slowly over the mountains painting the sky with shades of orange and pink.",
    ];

    let text = '';
    let chars = [];
    let pos = 0;
    let errors = 0;
    // FIX 2: track which positions had errors so backspace can undo them
    let errorPositions = new Set();
    let started = false;
    let countdown = 60;
    let interval = null;
    let finished = false;
    // FIX 3: track actual elapsed seconds properly
    let elapsedSeconds = 0;

    // FIX 1: dedicated focus function that targets the hidden input
    function focusInput() {
      document.getElementById('typingInput').focus();
    }

    function setup() {
      text = sentences[Math.floor(Math.random() * sentences.length)];
      chars = text.split('');
      pos = 0;
      errors = 0;
      errorPositions = new Set();
      started = false;
      finished = false;
      countdown = 60;
      elapsedSeconds = 0;

      document.getElementById('wpm').textContent = '0';
      document.getElementById('acc').textContent = '100';
      document.getElementById('timer').textContent = '60';
      document.getElementById('doneMsg').textContent = '';

      let box = document.getElementById('textBox');
      box.innerHTML = '';
      chars.forEach((c, i) => {
        let span = document.createElement('span');
        span.className = 'char' + (i === 0 ? ' active' : '');
        span.textContent = c;
        box.appendChild(span);
      });

      let input = document.getElementById('typingInput');
      input.value = '';
      // Remove readonly so keydown events fire properly
      input.removeAttribute('readonly');
      input.focus();
    }

    document.getElementById('typingInput').addEventListener('keydown', function(e) {
      if (finished) return;

      // FIX 3: start timer on first keypress; elapsed starts at 1 after the first second
      if (!started) {
        started = true;
        elapsedSeconds = 0;
        interval = setInterval(() => {
          elapsedSeconds++;
          countdown--;
          document.getElementById('timer').textContent = countdown;
          updateStats();
          if (countdown <= 0) endGame();
        }, 1000);
      }

      let spans = document.querySelectorAll('#textBox .char');

      if (e.key === 'Backspace') {
        e.preventDefault();
        if (pos <= 0) return;
        spans[pos].classList.remove('active');
        pos--;
        // FIX 2: if this position was an error, remove it from errorPositions
        if (errorPositions.has(pos)) {
          errorPositions.delete(pos);
          errors--;
        }
        spans[pos].classList.remove('correct', 'wrong');
        spans[pos].classList.add('active');
        updateStats();
        return;
      }

      if (e.key.length !== 1) return;
      e.preventDefault();

      if (e.key === chars[pos]) {
        spans[pos].classList.remove('active', 'wrong');
        spans[pos].classList.add('correct');
      } else {
        spans[pos].classList.remove('active', 'correct');
        spans[pos].classList.add('wrong');
        // FIX 2: only count new errors (not re-typing an already-errored char without backspacing)
        if (!errorPositions.has(pos)) {
          errorPositions.add(pos);
          errors++;
        }
      }

      pos++;

      if (pos >= chars.length) {
        endGame();
        return;
      }

      spans[pos].classList.add('active');
      updateStats();
    });

    // FIX 3: centralized stats update using elapsedSeconds
    function updateStats() {
      let correctChars = document.querySelectorAll('.char.correct').length;
      let elapsed = Math.max(elapsedSeconds, 1);
      let wpm = Math.round((correctChars / 5) / (elapsed / 60));
      let total = pos;
      let acc = total > 0 ? Math.round(((total - errors) / total) * 100) : 100;
      document.getElementById('wpm').textContent = wpm;
      document.getElementById('acc').textContent = acc;
    }

    function endGame() {
      clearInterval(interval);
      finished = true;

      let correctChars = document.querySelectorAll('.char.correct').length;
      let elapsed = Math.max(elapsedSeconds, 1);
      let wpm = Math.round((correctChars / 5) / (elapsed / 60));
      let total = Math.max(pos, 1);
      let acc = Math.round(((total - errors) / total) * 100);

      document.getElementById('wpm').textContent = wpm;
      document.getElementById('acc').textContent = acc;
      document.getElementById('timer').textContent = '0';

      let msg = wpm >= 80 ? 'Blazing fast! 🔥' : wpm >= 50 ? 'Nicely done!' : 'Keep practicing!';
      document.getElementById('doneMsg').textContent = msg + ' ' + wpm + ' WPM · ' + acc + '% accuracy';
    }

    function restart() {
      clearInterval(interval);
      setup();
    }

    setup();
  </script>
</body>
</html>
